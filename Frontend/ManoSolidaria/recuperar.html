<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 mx-auto" style="max-width:500px;">

        <h2 class="text-center mb-3">
            Recuperar contraseña
        </h2>

        <p class="text-muted text-center">
            Ingresa tu correo electrónico.
        </p>

        <input
                type="email"
                id="email"
                class="form-control mb-3"
                placeholder="correo@ejemplo.com">

        <div id="mensajeReset" class="mb-3"></div>

        <button
                class="btn btn-primary"
                onclick="enviarCorreo()">
            Enviar enlace
        </button>

        <a href="login.html" class="text-center mt-3">
            Volver al login
        </a>

    </div>

</div>

<script>

async function enviarCorreo(){

    const email =
        document.getElementById("email").value;

    const response = await fetch(
        "http://localhost:8080/api/donadores/forgot-password",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email:email
            })
        }
    );

    const data = await response.json();

    if(response.ok){
        mostrarAlerta(data.mensaje, "success", "mensajeReset");
    }else{
        mostrarAlerta(data.error || "Error al enviar", "danger", "mensajeReset");
    }
}

function mostrarAlerta(mensaje, tipo, contenedorId) {
    const alertaHtml = `
        <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
            ${mensaje}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    `;
    
    const contenedor = document.getElementById(contenedorId);
    if (contenedor) {
        contenedor.innerHTML = alertaHtml;
        setTimeout(() => {
            const alerta = contenedor.querySelector('.alert');
            if (alerta) alerta.remove();
        }, 4000);
    }
}

</script>

</body>
</html>
