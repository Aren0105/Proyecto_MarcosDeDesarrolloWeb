<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Qusqu Kamayuq</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { min-height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 30px; overflow: hidden; background: white; }
        .login-image {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('img/acerca-nosotros.jpg');
            background-size: cover;
            background-position: center;
            min-height: 400px;
        }
        .form-control:focus { border-color: var(--naranja); box-shadow: 0 0 0 0.25rem rgba(255, 160, 122, 0.25); }
    </style>
</head>
<body>

    <div class="container login-container py-5">
        <div class="row w-100 justify-content-center mx-0">
            <div class="col-lg-10 shadow-lg login-card p-0">
                <div class="row g-0">
                    <div class="col-md-6 d-none d-md-block login-image d-flex align-items-end p-5">
                        <div class="text-white">
                            <h2 class="fw-black">Bienvenido de nuevo</h2>
                            <p>Tu apoyo sigue transformando vidas en todo el Perú.</p>
                        </div>
                    </div>
                    
                    <div class="col-md-6 p-5">
                        <div class="mb-4 text-center text-md-start">
                            <a href="index.html" class="text-decoration-none fw-black fs-4" style="color: var(--naranja);">Qusqu kamayuq</a>
                            <h3 class="fw-bold mt-3">Iniciar Sesión</h3>
                            <p class="text-muted">Ingresa tus credenciales para continuar.</p>
                        </div>

                        <form id="formLogin">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Correo electrónico</label>
                                <input type="email" id="loginEmail" class="form-control py-3 rounded-3 border-0 bg-light" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="mb-4">
                                <div class="d-flex justify-content-between">
                                    <label class="form-label small fw-bold">Contraseña</label>
                                    <a href="#" class="small text-decoration-none text-muted">¿Olvidaste tu contraseña?</a>
                                </div>
                                <input type="password" id="loginPass" class="form-control py-3 rounded-3 border-0 bg-light" placeholder="••••••••" required>
                            </div>
                            
                            <button type="submit" id="btnLogin" class="btn btn-dark w-100 py-3 fw-bold rounded-3 mb-4 shadow-sm">
                                Entrar a mi cuenta
                            </button>

                            <div class="text-center">
                                <p class="small text-muted">¿Aún no tienes cuenta? <a href="registro.html" class="fw-bold text-decoration-none" style="color: var(--naranja);">Regístrate aquí</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
