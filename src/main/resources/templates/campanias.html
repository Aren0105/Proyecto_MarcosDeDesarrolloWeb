<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campañas - Qusqu Kamayuq</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="/style.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg sticky-top py-2 px-lg-5">
        <div class="container-fluid px-lg-4">
            <a class="navbar-brand" th:href="@{/home}">Qusqu kamayuq</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link fw-semibold py-1 px-3 rounded-pill text-dark"
                            href="/acerca">Acerca de</a></li>
                    <li class="nav-item"><a class="nav-link active fw-semibold py-1 px-3 rounded-pill text-dark"
                            href="/campanias">Campañas</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold py-1 px-3 rounded-pill text-dark"
                            href="/donar">Donar</a></li>
                    <li class="nav-item" id="nav-usuario">
                        <a class="nav-link btn-ingresar ms-2 rounded fw-bold py-1 px-3" href="/login">Ingresar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="display-5 fw-bold">Campañas Activas</h1>
            <a href="/crear-campania" class="btn btn-dark fw-bold admin-only" style="display: none;">
                <i class="bi bi-plus-circle me-1"></i> Crear Nueva Campaña
            </a>
        </div>
        <div id="lista-campanias" class="row g-4">
            <!-- Las campañas se cargarán aquí por JS -->
            <div class="text-center">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p>Cargando campañas...</p>
            </div>
        </div>
    </main>

    <!-- Modal para Donar a Campaña Específica -->
    <div class="modal fade" id="modalDonarCampania" tabindex="-1" aria-labelledby="modalDonarCampaniaLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalDonarCampaniaLabel">Donar a...</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <p class="small text-muted">Selecciona el monto que deseas aportar a esta causa.</p>

                    <!-- Formulario de Donación del Modal -->
                    <div class="row g-2 mb-3">
                        <div class="col-4">
                            <button class="btn btn-outline-secondary monto-fijo-modal w-100 py-2 fw-bold small">
                                S/. 50
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-secondary monto-fijo-modal w-100 py-2 fw-bold small">
                                S/. 100
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-secondary monto-fijo-modal w-100 py-2 fw-bold small">
                                S/. 200
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 fw-bold">S/.</span>
                            <input type="number" id="inputMontoModal" class="form-control border-start-0 shadow-none"
                                placeholder="Otra cantidad">
                        </div>
                    </div>

                    <div id="mensajeDonacionModal" class="mb-3"></div>

                    <button id="btnConfirmarDonacionModal" class="btn w-100 py-2 fw-bold text-white fs-6" style="
                        background-color: var(--naranja2);
                        border: none;
                    ">Confirmar Donación</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/main.js}"></script>
</body>

</html>
