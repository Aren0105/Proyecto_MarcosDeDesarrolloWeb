<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Campaña - Qusqu Kamayuq</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="/style.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg sticky-top py-2 px-lg-5">
        <div class="container-fluid px-lg-4">
            <a class="navbar-brand" th:href="@{/home}">Qusqu kamayuq</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link fw-semibold py-1 px-3 rounded-pill text-dark"
                            href="/acerca">Acerca de</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold py-1 px-3 rounded-pill text-dark"
                            href="/campanias">Campañas</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold py-1 px-3 rounded-pill text-dark"
                            href="/donar">Donar</a></li>
                    <li class="nav-item" id="nav-usuario">
                        <a class="nav-link btn-ingresar ms-2 rounded fw-bold py-1 px-3" href="/login">Ingresar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm p-4 p-md-5">
                    <h1 class="fw-bold mb-4">Crear Nueva Campaña</h1>
                    <form id="formCrearCampania">
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre de la Campaña</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-bold">Descripción</label>
                            <textarea class="form-control" id="descripcion" name="descripcion" rows="4"
                                required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="metaRecaudacion" class="form-label fw-bold">Meta de Recaudación (S/.)</label>
                            <input type="number" class="form-control" id="metaRecaudacion" name="metaRecaudacion"
                                step="0.01" required>
                        </div>
                        <div class="mb-4">
                            <label for="fechaFin" class="form-label fw-bold">Fecha de Finalización</label>
                            <input type="date" class="form-control" id="fechaFin" name="fechaFin">
                        </div>
                        <div id="mensajeCrearCampania"></div>
                        <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Publicar Campaña</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/main.js}"></script>
</body>

</html>
