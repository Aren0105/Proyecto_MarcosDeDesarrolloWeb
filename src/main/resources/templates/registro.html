<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Qusqu Kamayuq</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <link th:href="@{/style.css}" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }

    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .login-card {
      border-radius: 30px;
      overflow: hidden;
      background: white;
    }

    .login-image {
      /* Corregido agregando la barra / para evitar errores de ruta en subcarpetas */
      background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('/img/acerca-nosotros.jpg');
      background-size: cover;
      background-position: center;
      min-height: 400px;
    }
  </style>
</head>

<body>

  <div class="container login-container py-5">
    <div class="row w-100 justify-content-center mx-0">
      <div class="col-lg-10 shadow-lg login-card p-0">
        <div class="row g-0 flex-row-reverse">
          <div class="col-md-6 d-none d-md-block login-image d-flex align-items-end p-5">
            <div class="text-white">
              <h2 class="fw-black">Únete a la causa</h2>
              <p>Crea tu cuenta y empieza a gestionar el cambio hoy mismo.</p>
            </div>
          </div>

          <div class="col-md-6 p-5">
            <div class="mb-4">
              <a th:href="@{/}" class="text-decoration-none fw-black fs-4" style="color: var(--naranja);">Qusqu
                kamayuq</a>
              <h3 class="fw-bold mt-3">Crear Cuenta</h3>
            </div>

            <form id="formRegistro">
              <div class="mb-3">
                <label class="form-label small fw-bold">Nombre Completo</label>
                <input type="text" id="regNombre" class="form-control py-3 rounded-3 border-0 bg-light"
                  placeholder="Juan Pérez" required>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">Correo electrónico</label>
                <input type="email" id="regEmail" class="form-control py-3 rounded-3 border-0 bg-light"
                  placeholder="correo@ejemplo.com" required>
              </div>
              <div class="mb-4">
                <label class="form-label small fw-bold">Contraseña</label>
                <input type="password" id="regPass" class="form-control py-3 rounded-3 border-0 bg-light"
                  placeholder="Crea una contraseña" required>
              </div>

              <div id="mensajeRegistro" class="mb-3"></div>

              <button type="submit" id="btnRegistrar" class="btn btn-dark w-100 py-3 fw-bold rounded-3 mb-4 shadow-sm"
                style="background-color: var(--naranja); border: none;">
                Registrarme
              </button>

              <div class="text-center">
                <p class="small text-muted">¿Ya tienes cuenta? <a th:href="@{/login}"
                    class="fw-bold text-decoration-none text-dark">Inicia sesión</a></p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/main.js}"></script>
</body>

</html>
